<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laminate Harvester Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
    </script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .haptic-btn:active { transform: scale(0.98); transition: transform 0.05s; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Smooth scrolling for the table */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col min-h-screen font-sans">

    <!-- Compact Header -->
    <header class="p-4 bg-slate-900 border-b border-slate-800">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xl font-black text-blue-500 tracking-tight">LAMINATE AI</h1>
            <button id="toggleSettings" class="text-slate-400 text-xs uppercase font-bold tracking-widest">API Key ⚙️</button>
        </div>
        <div id="settingsPanel" class="hidden flex gap-2 pb-2">
            <input type="password" id="apiKey" placeholder="Gemini API Key" 
                class="flex-grow bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            <button id="saveKey" class="bg-slate-700 px-4 py-2 rounded-lg text-sm font-bold haptic-btn">Save</button>
        </div>
    </header>

    <main class="flex-grow flex flex-col p-4 gap-4">
        
        <!-- Camera Container -->
        <div class="relative rounded-2xl overflow-hidden border-2 border-slate-700 bg-black shadow-2xl aspect-[4/3] w-full mx-auto max-w-md">
            <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
            <canvas id="captureCanvas" class="hidden"></canvas>
            
            <!-- Processing Overlay -->
            <div id="loadingOverlay" class="absolute inset-0 bg-slate-900/80 flex items-center justify-center hidden z-10">
                <div class="flex flex-col items-center gap-3">
                    <div class="spinner"></div>
                    <span class="text-blue-400 font-bold tracking-widest text-xs uppercase">Analyzing Label...</span>
                </div>
            </div>
        </div>

        <!-- Direct Action Area -->
        <div class="flex flex-col gap-3 max-w-md mx-auto w-full">
            <button id="captureBtn" class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white py-4 rounded-2xl text-xl font-black shadow-xl shadow-blue-900/40 haptic-btn flex items-center justify-center gap-3 border-b-4 border-blue-800">
                <span>📸 SCAN LABEL</span>
            </button>

            <!-- Small Preview Thumbnail (Appears after first scan) -->
            <div id="previewContainer" class="flex items-center gap-3 bg-slate-800/50 p-2 rounded-xl border border-slate-700 hidden">
                <img id="lastCaptureThumb" class="w-16 h-16 object-cover rounded-lg border border-slate-600 shadow-lg">
                <div class="flex flex-col">
                    <span class="text-[10px] uppercase font-bold text-slate-500">Last Capture</span>
                    <span id="lastCaptureStatus" class="text-xs text-blue-300 font-medium italic italic">Processing...</span>
                </div>
            </div>
        </div>

        <!-- Data Section -->
        <div class="flex-grow flex flex-col min-h-0 mt-2">
            <div class="flex justify-between items-end mb-2">
                <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400">Scanned Inventory</h2>
                <button id="exportBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] px-3 py-1.5 rounded-lg font-black haptic-btn transition-colors uppercase">Export CSV</button>
            </div>
            
            <div class="flex-grow bg-slate-800/80 rounded-2xl border border-slate-700 overflow-hidden flex flex-col shadow-inner">
                <div class="flex-grow overflow-y-auto custom-scroll">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead class="sticky top-0 bg-slate-900 text-[10px] uppercase tracking-tighter text-slate-500 border-b border-slate-700">
                            <tr>
                                <th class="p-3">Code</th>
                                <th class="p-3">Laminate Name</th>
                                <th class="p-3 text-right">Del</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="divide-y divide-slate-700/50">
                            <!-- Rows -->
                        </tbody>
                    </table>
                    <div id="emptyState" class="p-12 text-center flex flex-col items-center gap-2">
                        <div class="text-3xl opacity-20">📋</div>
                        <div class="text-slate-500 text-sm italic font-light">List is empty. Scan a label to start.</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        let scannedData = [];
        const video = document.getElementById('video');
        const canvas = document.getElementById('captureCanvas');
        const apiKeyInput = document.getElementById('apiKey');
        const tableBody = document.getElementById('dataTableBody');
        const emptyState = document.getElementById('emptyState');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const lastCaptureThumb = document.getElementById('lastCaptureThumb');
        const previewContainer = document.getElementById('previewContainer');
        const lastCaptureStatus = document.getElementById('lastCaptureStatus');

        // Toggle Settings Logic
        document.getElementById('toggleSettings').addEventListener('click', () => {
            document.getElementById('settingsPanel').classList.toggle('hidden');
        });

        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) apiKeyInput.value = savedKey;
            initCamera();
        });

        document.getElementById('saveKey').addEventListener('click', () => {
            localStorage.setItem('gemini_api_key', apiKeyInput.value);
            alert('Key Saved. Ready to Scan.');
            document.getElementById('settingsPanel').classList.add('hidden');
        });

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera access required for OCR scanning.");
            }
        }

        document.getElementById('captureBtn').addEventListener('click', async () => {
            const key = apiKeyInput.value;
            if (!key) return alert("Enter API Key in settings first.");

            // 1. UI: Immediate Feedback
            loadingOverlay.classList.remove('hidden');
            previewContainer.classList.remove('hidden');
            lastCaptureStatus.textContent = "Processing...";
            window.navigator.vibrate?.(40);

            try {
                // 2. Capture and show thumbnail
                const context = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const fullImageData = canvas.toDataURL('image/jpeg', 0.7);
                lastCaptureThumb.src = fullImageData;
                const base64Image = fullImageData.split(',')[1];

                // 3. AI Processing
                const genAI = new GoogleGenerativeAI(key);
                const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" });

                const prompt = `Act as a precision OCR engine for industrial labels. Extract the 5-digit sample code (including trailing letters like RH, LV, MR) and the laminate/wood name. Return ONLY JSON: {"code": "...", "name": "..."}. If failed, return {"error": "retry"}.`;

                const result = await model.generateContent([
                    prompt,
                    { inlineData: { data: base64Image, mimeType: "image/jpeg" } }
                ]);

                const response = await result.response;
                let text = response.text().trim().replace(/```json|```/g, "");
                const data = JSON.parse(text);

                if (data.error) {
                    lastCaptureStatus.textContent = "Failed. Try again.";
                    lastCaptureStatus.className = "text-xs text-red-400 font-bold";
                } else {
                    addRecord(data.code, data.name);
                    lastCaptureStatus.textContent = "Success: " + data.code;
                    lastCaptureStatus.className = "text-xs text-emerald-400 font-bold";
                    window.navigator.vibrate?.([40, 100, 40]);
                }

            } catch (err) {
                console.error(err);
                lastCaptureStatus.textContent = "System Error";
                alert("Scan Error: " + err.message);
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        });

        function addRecord(code, name) {
            const record = { id: Date.now(), code, name, timestamp: new Date().toLocaleString() };
            scannedData.unshift(record);
            renderTable();
        }

        window.deleteEntry = (id) => {
            scannedData = scannedData.filter(item => item.id !== id);
            renderTable();
        };

        function renderTable() {
            emptyState.style.display = scannedData.length ? 'none' : 'flex';
            tableBody.innerHTML = scannedData.map(item => `
                <tr class="hover:bg-slate-700/30 transition-colors">
                    <td class="p-3 font-mono text-blue-400 font-bold">${item.code}</td>
                    <td class="p-3 text-slate-200 text-xs">${item.name}</td>
                    <td class="p-3 text-right">
                        <button onclick="window.deleteEntry(${item.id})" class="text-slate-500 hover:text-red-400 p-2">✕</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('exportBtn').addEventListener('click', () => {
            if (!scannedData.length) return;
            const headers = "Code,Name,Timestamp\n";
            const csv = scannedData.map(r => `"${r.code}","${r.name}","${r.timestamp}"`).join("\n");
            const blob = new Blob([headers + csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Laminate_Data_${new Date().toLocaleDateString().replace(/\//g,'-')}.csv`;
            a.click();
        });
    </script>
</body>
</html>
